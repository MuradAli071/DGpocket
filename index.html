<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan Ledger | Enterprise Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
    <section id="view-home" class="flex-center">
        <div class="welcome-box">
            <header class="header">
                <h1>Digiwallet</h1><br>
              
            </header>
            <div class="card">
                <div class="input-group">
                    <input type="text" id="w-name" placeholder="Wallet Identity">
                    <input type="password" id="w-pin" placeholder="Security PIN">
                    <button class="btn-primary" onclick="addWallet()">✨ Initialize Wallet</button>
                </div>
            </div>
            <div id="wallet-list" class="grid-layout"></div>
        </div>
    </section>

    <section id="view-detail" class="dashboard-layout hidden">
        <nav class="top-nav">
            <div class="nav-left">
                <button class="btn-ghost" onclick="changeView('home')">← Lock</button>
                <h2 id="detail-wallet-name">WALLET</h2>
            </div>
            <div class="nav-right">
                <div class="stat-box">
                    <small>Available Balance</small>
                    <h3 id="total-val">0.00</h3>
                </div>
                <button class="btn-danger-text" id="btn-delete-wallet">Delete Wallet</button>
            </div>
        </nav>

        <div class="main-content">
            <aside class="sidebar">
                <div class="card sticky">
                    <h3>New Transaction</h3>
                    <select id="t-type" onchange="toggleMode()">
                        <option value="expense">Expense</option>
                        <option value="income">Cash In </option>
                    </select>

                    <div class="input-group">
                        <label>Title</label>
                        <input type="text" id="t-desc" placeholder="Category/Title">
                        
                        <div id="item-builder-container">
                            <label>Line Items</label>
                            <div class="row-gap">
                                <input type="text" id="sub-item-name" placeholder="Item">
                                <input type="number" id="sub-item-price" placeholder="Price">
                                <button onclick="addItemToList()" class="btn-square">+</button>
                            </div>
                            <ul id="temp-item-list" class="fancy-list"></ul>
                        </div>

                        <div id="cash-input-container" class="hidden">
                            <label>Total Amount</label>
                            <input type="number" id="single-amt" placeholder="0.00">
                        </div>

                        <button class="btn-primary" onclick="saveFullTransaction()">save </button>
                    </div>
                </div>
            </aside>

            <main class="ledger-container">
                <div class="ledger-header">
                    <h3>Transaction History</h3>
                    <div class="filters">
                        <span>Automatic Date Sorting Enabled</span>
                    </div>
                </div>
                <div id="transaction-list"></div>
            </main>
        </div>
    </section>
</div>
<footer></footer>

<script src="index.js"></script>
</body>
</html>
